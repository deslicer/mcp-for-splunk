# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "MCP Server for Splunk - Gitleaks Configuration"

# Common patterns to detect secrets
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)['\"]?\s*[:=]\s*['"]?([0-9a-zA-Z\-_]{20,})'''
tags = ["key", "API"]
[rules.allowlist]
paths = [
    '''env\.example''',
    '''\.md$''',
]

[[rules]]
id = "splunk-token"
description = "Splunk Authentication Token"
regex = '''(?i)(splunk[_-]?token)['\"]?\s*[:=]\s*['"]?([0-9a-zA-Z\-_]{32,})'''
tags = ["splunk", "token"]
[rules.allowlist]
paths = [
    '''mcp_itsi/config/''',
    '''tests/''',
    '''docs/.*\.md''',
]
regexes = [
    '''(?i)splunk_token\s*=''',
    '''(?i)os\.getenv''',
]

[[rules]]
id = "splunk-password"
description = "Splunk Password"
regex = '''(?i)(splunk[_-]?password)['\"]?\s*[:=]\s*['"]?([^\s'"]{8,})'''
tags = ["splunk", "password"]
[rules.allowlist]
paths = [
    '''env\.example''',
    '''README\.md''',
    '''docs/.*\.md''',
    '''tests/''',
    '''conftest\.py$''',
    '''docker-compose.*\.yml$''',
    '''scripts/test_.*''',
    '''scripts/build_and_run\.(sh|ps1)$''',
    '''scripts/run_splunk\.sh$''',
    '''scripts/README.*\.md$''',
    '''examples/''',
    '''mcp_itsi/knowledge/''',
    '''\.github/workflows/''',
    '''src/cli/''',
]
regexes = [
    '''os\.getenv''',
    '''os\.environ''',
    '''\$\{SPLUNK_PASSWORD''',
    '''\$\{.*PASSWORD.*\}''',
    '''(?i)splunk_password''',  # Config key name, not a secret value
    '''(?i)Splunk-Password''',  # HTTP header name, not a secret value
    '''(?i)your-password''',  # Documentation placeholder
    '''(?i)changeme''',  # Documentation placeholder
    '''(?i)Chang3d!''',  # Well-known Splunk Docker default
    '''gitleaks:allow''',
]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Key"
regex = '''(?i)aws[_-]?secret[_-]?access[_-]?key['\"]?\s*[:=]\s*['"]?([0-9a-zA-Z/+=]{40})'''
tags = ["aws", "secret"]

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''gho_[0-9a-zA-Z]{36}'''
tags = ["github", "oauth"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "generic-credential"
description = "Generic Credential"
regex = '''(?i)(password|passwd|pwd|secret|token)['\"]?\s*[:=]\s*['"]?([^\s'"\n]{8,})'''
tags = ["credential"]
[rules.allowlist]
paths = [
    '''env\.example''',
    '''\.md$''',
    '''tests/''',
    '''conftest\.py$''',
    '''test.*\.py$''',
    '''.*_test\.py$''',
    '''docker-compose.*\.yml$''',
    '''scripts/''',
    '''examples/''',
    '''mcp_itsi/''',
    '''src/''',
    '''\.github/workflows/''',
]
regexes = [
    '''password.*=.*\$\{.*\}''',  # Environment variable references
    '''password.*=.*os\.getenv''',  # Python env var
    '''password.*:.*os\.getenv''',  # Dict env var reference
    '''password.*=.*"<.*>"''',  # Placeholder
    '''(?i)"password": "password"''',  # splunklib connect kwarg mapping
    '''(?i)_token\s*=.*\.set\(''',  # ContextVar token return values
    '''(?i)token\s*=.*\.set\(''',  # ContextVar token return values
    '''(?i)PASSWORD": "splunk_''',  # Env-to-config key mapping
    '''(?i)TOKEN": "splunk_''',  # Env-to-config key mapping
    '''(?i)Password: Chang3d!''',  # Well-known Splunk Docker default
    '''(?i)Password: \*\*\*''',  # Redacted password display
    '''(?i)splunk_password''',  # Config key name
    '''(?i)splunk_token''',  # Config key name
    '''(?i)ContextVar''',  # stdlib contextvar token return values
    '''nosec B105''',
    '''gitleaks:allow''',
]

# Global allowlist
[allowlist]
paths = [
    '''\.git/''',
    '''\.venv/''',
    '''/node_modules/''',
    '''uv\.lock''',
    '''package-lock\.json''',
    '''\.pytest_cache/''',
    '''\.mypy_cache/''',
    '''__pycache__/''',
    '''\.pyc$''',
    '''\.ruff_cache/''',
    '''\.worktrees/''',
    '''\.gitleaksignore$''',
    '''\.env$''',
    '''\.env_bak$''',
]

regexes = [
    '''(?i)EXAMPLE''',
    '''(?i)REPLACE[_-]WITH''',
    '''(?i)YOUR[_-](API|KEY|TOKEN|SECRET|PASSWORD)''',
    '''(?i)<.*>''',  # Placeholders in angle brackets
    '''(?i)\$\{.*\}''',  # Environment variable references
    '''(?i)Splunk-Password''',  # HTTP header name
    '''(?i)your-password''',
    '''(?i)changeme''',
]

descriptions = [
    '''(?i)example''',
    '''(?i)test''',
    '''(?i)placeholder''',
]
