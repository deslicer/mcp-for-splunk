name: Fix CI Failures

on:
  workflow_run:
    workflows: [Quality Gate]
    types: [completed]

concurrency:
  group: fix-ci-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  attempt-fix:
    uses: deslicer/deslicer-code-harness/.github/workflows/core_auto_fix_ci.yml@v1
    with:
      model: gpt-5.2
      push_to_pr_branch: true
    secrets:
      cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
