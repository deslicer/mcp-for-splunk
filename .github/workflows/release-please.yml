name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Per-package outputs from googleapis/release-please-action@v5.
      # In manifest mode the action emits ``${path}--${key}`` for non-root
      # paths, but for the root path (``.``) it emits the bare key — see
      # `dist/index.js` `if (path === '.') { core.setOutput(key, value); }`.
      # https://github.com/googleapis/release-please-action#outputs
      parent_released: ${{ steps.release.outputs.release_created }}
      itsi_released: ${{ steps.release.outputs['packaging/mcp-itsi-server--release_created'] }}
      parent_tag: ${{ steps.release.outputs.tag_name }}
      parent_version: ${{ steps.release.outputs.version }}
      itsi_tag: ${{ steps.release.outputs['packaging/mcp-itsi-server--tag_name'] }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/release-please-manifest.json

  build-publish-parent:
    needs: release-please
    if: needs.release-please.outputs.parent_released == 'true'
    uses: ./.github/workflows/release.yml
    with:
      package: parent
    secrets: inherit

  build-publish-itsi:
    needs: release-please
    if: needs.release-please.outputs.itsi_released == 'true'
    uses: ./.github/workflows/release.yml
    with:
      package: itsi
    secrets: inherit

  # Docker image tracks the parent package (tagged `v*.*.*`). The tag created
  # by release-please can't trigger docker.yml's `push: tags` event, so we fan
  # out to it directly here on merge.
  build-docker-parent:
    needs: release-please
    if: needs.release-please.outputs.parent_released == 'true'
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.release-please.outputs.parent_version }}
    secrets: inherit
