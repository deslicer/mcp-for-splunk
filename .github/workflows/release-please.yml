name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Per-package outputs from googleapis/release-please-action@v4.
      # See https://github.com/googleapis/release-please-action#outputs
      parent_released: ${{ steps.release.outputs['.--release_created'] }}
      itsi_released: ${{ steps.release.outputs['packaging/mcp-itsi-server--release_created'] }}
      parent_tag: ${{ steps.release.outputs['.--tag_name'] }}
      itsi_tag: ${{ steps.release.outputs['packaging/mcp-itsi-server--tag_name'] }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/release-please-manifest.json

  build-publish-parent:
    needs: release-please
    if: needs.release-please.outputs.parent_released == 'true'
    uses: ./.github/workflows/release.yml
    with:
      package: parent
    secrets: inherit

  build-publish-itsi:
    needs: release-please
    if: needs.release-please.outputs.itsi_released == 'true'
    uses: ./.github/workflows/release.yml
    with:
      package: itsi
    secrets: inherit
