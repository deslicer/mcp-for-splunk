name: Cursor Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    uses: deslicer/deslicer-code-harness/.github/workflows/core_cursor_code_review.yml@v1
    with:
      model: gpt-5.3-codex
    secrets:
      cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
